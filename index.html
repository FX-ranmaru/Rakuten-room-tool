<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>楽天ROOM 投稿ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--card:#fff;--primary:#e63b2e;--primary-light:#fff0ef;--midnight:#1e2a4a;--midnight-light:#eef1f8;--noon:#d97706;--noon-light:#fef9ee;--manga:#8b5cf6;--manga-light:#f5f3ff;--interior:#10b981;--interior-light:#ecfdf5;--text:#1a1a1a;--text-sub:#6b7280;--border:#e5e7eb;--done-bg:#d1fae5;--radius:16px;--shadow:0 2px 12px rgba(0,0,0,0.07)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
.header{background:var(--primary);color:white;padding:20px 16px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(230,59,46,0.3)}
.header h1{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700}
.header p{font-size:11px;opacity:.85;margin-top:2px}
.progress-wrap{background:rgba(255,255,255,0.2);border-radius:99px;height:6px;overflow:hidden;margin-top:12px}
.progress-bar{background:white;height:100%;border-radius:99px;transition:width .4s}
.progress-text{font-size:11px;opacity:.9;margin-top:6px;text-align:right}
.tabs{display:flex;gap:8px;padding:14px 16px 0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:99px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:var(--card);color:var(--text-sub);box-shadow:var(--shadow);transition:all .2s}
.tab.active{background:var(--primary);color:white}
.counters{display:flex;gap:10px;padding:12px 16px 0}
.counter-card{flex:1;background:var(--card);border-radius:12px;padding:10px 12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:8px}
.counter-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.counter-card .label{font-size:11px;color:var(--text-sub)}
.counter-card .count{font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif}
.list{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.post-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.post-card.done{opacity:.55}
.post-card.done .card-body{background:var(--done-bg)}
.card-header{display:flex;align-items:center;padding:10px 14px;gap:10px;border-bottom:1px solid var(--border)}
.card-no{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;color:var(--text-sub);min-width:26px}
.time-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;flex-shrink:0}
.time-midnight{background:var(--midnight-light);color:var(--midnight)}
.time-noon{background:var(--noon-light);color:var(--noon)}
.genre-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;flex-shrink:0}
.genre-manga{background:var(--manga-light);color:var(--manga)}
.genre-interior{background:var(--interior-light);color:var(--interior)}
.card-body{padding:12px 14px;transition:background .3s}
.product-name{font-size:14px;font-weight:700;margin-bottom:8px;line-height:1.4}
.link-btn{display:flex;align-items:center;gap:6px;background:var(--primary-light);color:var(--primary);text-decoration:none;font-size:12px;font-weight:600;padding:8px 12px;border-radius:10px;margin-bottom:10px}
.link-btn:active{background:#ffd9d7}
.copy-area{background:#fafafa;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-all;cursor:pointer;transition:border-color .2s,background .2s}
.copy-area:active{background:#eff6ff;border-color:#93c5fd}
.copy-hint{font-size:11px;color:var(--text-sub);margin-top:6px;display:flex;align-items:center;gap:4px}
.check-row{margin-top:10px;display:flex;justify-content:flex-end}
.check-btn{display:flex;align-items:center;gap:6px;background:#f3f4f6;color:var(--text-sub);border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .2s}
.check-btn.checked{background:#d1fae5;color:#065f46}
.check-icon{width:18px;height:18px;border:2px solid currentColor;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.check-btn.checked .check-icon{background:#10b981;border-color:#10b981;color:white}
.empty{text-align:center;padding:40px 20px;color:var(--text-sub);font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#111;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

  <button class="tab" onclick="filterTab('midnight',this)">🌙 深夜</button>
  <button class="tab" onclick="filterTab('noon',this)">☀️ 昼</button>
  <button class="tab" onclick="filterTab('manga',this)">📚 漫画</button>

<div class="counters">

</div>

const genreLabel={manga:"📚 漫画",interior:"🏠 インテリア"};
const timeLabel={midnight:"🌙 深夜0時",noon:"☀️ 昼12時"};
let doneSet=new Set(JSON.parse(localStorage.getItem('room_done_v2')||'[]'));
let currentFilter='all';
function rakutenUrl(p){return 'https://search.rakuten.co.jp/search/mall/'+encodeURIComponent(p)+'/';}
function saveDone(){localStorage.setItem('room_done_v2',JSON.stringify([...doneSet]));}
function updateProgress(){
  const total=posts.length,done=doneSet.size;
  document.getElementById('progressBar').style.width=Math.round(done/total*100)+'%';
  document.getElementById('progressText').textContent=done+' / '+total+' 件投稿済み';
  const mdDone=posts.filter(p=>p.time==='midnight'&&doneSet.has(p.no)).length;
  const nDone=posts.filter(p=>p.time==='noon'&&doneSet.has(p.no)).length;
  document.getElementById('cnt-midnight').textContent=mdDone+'/50';
  document.getElementById('cnt-noon').textContent=nDone+'/50';
  document.getElementById('cnt-total').textContent=done+'/100';
}
function filterTab(filter,btn){
  currentFilter=filter;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}
function renderList(){
  const list=document.getElementById('list');
  let f=posts;
  if(currentFilter==='midnight')f=posts.filter(p=>p.time==='midnight');
  else if(currentFilter==='noon')f=posts.filter(p=>p.time==='noon');
  else if(currentFilter==='undone')f=posts.filter(p=>!doneSet.has(p.no));
  else if(currentFilter==='manga')f=posts.filter(p=>p.genre==='manga');
  else if(currentFilter==='interior')f=posts.filter(p=>p.genre==='interior');
  if(f.length===0){list.innerHTML='<div class="empty">🎉 このフィルターの投稿はすべて完了しました！</div>';return;}
  const CHK='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  list.innerHTML=f.map(p=>{
    const done=doneSet.has(p.no);
    return `<div class="post-card ${done?'done':''}" id="card-${p.no}">
      <div class="card-header">
        <span class="card-no">#${p.no}</span>
        <span class="time-badge time-${p.time}">${timeLabel[p.time]}</span>
        <span class="genre-badge genre-${p.genre}">${genreLabel[p.genre]}</span>
      </div>
      <div class="card-body">
        <div class="product-name">${p.product}</div>
        <a class="link-btn" href="${rakutenUrl(p.product)}" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          楽天市場で商品を探す →
        </a>
        <div class="copy-area" onclick="copyText(${p.no})">${p.text}</div>
        <div class="copy-hint">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          タップでコピー（投稿文＋ハッシュタグ）
        </div>
        <div class="check-row">
          <button class="check-btn ${done?'checked':''}" onclick="toggleDone(${p.no})" id="btn-${p.no}">
            <span class="check-icon">${done?CHK:''}</span>
            ${done?'投稿済み':'投稿済みにする'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function copyText(no){
  const post=posts.find(p=>p.no===no);if(!post)return;
  navigator.clipboard.writeText(post.text).then(()=>showToast()).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=post.text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy');}catch(e){}
    document.body.removeChild(ta);showToast();
  });
}
function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function toggleDone(no){
  if(doneSet.has(no))doneSet.delete(no);else doneSet.add(no);
  saveDone();updateProgress();
  const done=doneSet.has(no);
  const card=document.getElementById('card-'+no);
  const btn=document.getElementById('btn-'+no);
  const CHK='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  if(card)card.classList.toggle('done',done);
  if(btn){btn.className='check-btn'+(done?' checked':'');btn.innerHTML=`<span class="check-icon">${done?CHK:''}</span>${done?'投稿済み':'投稿済みにする'}`;}
  if(currentFilter==='undone')renderList();
}
updateProgress();
renderList();
</script>
