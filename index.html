<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>楽天ROOM 投稿ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f6f2; --card:#fff; --primary:#e8391e; --primary-dk:#c02e15; --primary-lt:#fff1ee;
  --accent:#1a1a2e; --text:#1a1a1a; --text-sub:#7a7a8a; --border:#e8e8e8;
  --success:#00b894; --success-lt:#e6faf6; --warn:#f59e0b; --warn-lt:#fffbeb;
  --child:#3b82f6; --child-lt:#eff6ff;
  --manga:#8b5cf6; --manga-lt:#f5f3ff;
  --interior:#10b981; --interior-lt:#ecfdf5;
  --gadget:#f59e0b; --gadget-lt:#fffbeb;
  --radius:14px; --radius-sm:8px;
  --shadow:0 2px 16px rgba(0,0,0,0.07);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}

/* ── HEADER ── */
.header{background:var(--accent);color:#fff;padding:16px 16px 12px;position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,0.25);}
.header h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.5px;}
.header h1 span{color:var(--primary);}
.header-sub{font-size:11px;opacity:0.6;margin-top:2px;margin-bottom:10px;}
.progress-row{display:flex;align-items:center;gap:10px;}
.progress-wrap{flex:1;background:rgba(255,255,255,0.15);border-radius:99px;height:5px;overflow:hidden;}
.progress-bar{background:var(--primary);height:100%;border-radius:99px;transition:width .4s;}
.progress-label{font-size:11px;opacity:.8;white-space:nowrap;}

/* ── SETTINGS ── */
.settings-panel{background:var(--accent);border-top:1px solid rgba(255,255,255,.08);padding:12px 16px;}
.settings-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.settings-label{font-size:11px;color:rgba(255,255,255,.6);min-width:90px;flex-shrink:0;}
.settings-inp{flex:1;padding:8px 12px;border:1.5px solid rgba(255,255,255,.15);border-radius:var(--radius-sm);font-size:13px;font-family:'Noto Sans JP',sans-serif;background:rgba(255,255,255,.08);color:#fff;outline:none;transition:border-color .2s;}
.settings-inp::placeholder{color:rgba(255,255,255,.35);}
.settings-inp:focus{border-color:var(--primary);}
.btn-save{padding:8px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;border:none;cursor:pointer;background:var(--primary);color:#fff;white-space:nowrap;}
.settings-status{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.sbadge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:99px;border:1px solid;}
.s-ok{color:var(--success);border-color:var(--success);}
.s-ng{color:var(--warn);border-color:var(--warn);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── MAIN TABS ── */
.main-tabs{display:flex;background:var(--accent);border-top:1px solid rgba(255,255,255,.08);}
.main-tab{flex:1;padding:11px 4px;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:rgba(255,255,255,.4);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.main-tab.active{color:#fff;border-bottom-color:var(--primary);}

/* ── POST LIST CONTROLS ── */
.list-controls{padding:12px 16px 0;display:flex;flex-direction:column;gap:10px;}
.control-card{background:var(--card);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);}
.control-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.ctrl-label{font-size:11px;font-weight:700;color:var(--text-sub);min-width:56px;}
.inp{flex:1;min-width:0;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Noto Sans JP',sans-serif;background:#fafafa;color:var(--text);outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--primary);background:#fff;}
select.inp{cursor:pointer;}
.btn{padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;border:none;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:active{background:var(--primary-dk);}
.btn-primary:disabled{background:#ccc;cursor:not-allowed;}

/* tone chips */
.tone-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.tone-chip{padding:6px 12px;border-radius:99px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--text-sub);cursor:pointer;transition:all .18s;}
.tone-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}

/* filter chips */
.chips-wrap{padding:10px 16px 0;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.chips-wrap::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--text-sub);cursor:pointer;transition:all .18s;}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}

/* counters */
.counters{display:flex;gap:8px;padding:10px 16px 0;}
.counter-card{flex:1;background:var(--card);border-radius:10px;padding:9px 10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:7px;}
.counter-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.counter-label{font-size:10px;color:var(--text-sub);}
.counter-value{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}

/* ── POST CARD ── */
.list-wrap{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.post-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.post-card.done{opacity:.5;}
.card-head{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border);}
.card-no{font-family:'Syne',sans-serif;font-size:12px;color:var(--text-sub);min-width:24px;}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;flex-shrink:0;}
.badge-child   {background:var(--child-lt);   color:var(--child);}
.badge-manga   {background:var(--manga-lt);   color:var(--manga);}
.badge-interior{background:var(--interior-lt);color:var(--interior);}
.badge-gadget  {background:var(--gadget-lt);  color:var(--gadget);}
.badge-general {background:#f3f4f6;           color:#374151;}
.card-body{padding:12px;}
.product-name{font-size:14px;font-weight:700;line-height:1.4;margin-bottom:4px;}
.product-meta{font-size:11px;color:var(--text-sub);margin-bottom:9px;display:flex;gap:8px;flex-wrap:wrap;}
.product-price{font-family:'Syne',sans-serif;font-weight:700;color:var(--primary);}
.link-btn{display:flex;align-items:center;gap:6px;text-decoration:none;background:var(--primary-lt);color:var(--primary);font-size:12px;font-weight:700;padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:9px;transition:background .2s;}
.link-btn:active{background:#fdd5cf;}
.copy-area{background:#fafafa;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:12.5px;line-height:1.75;white-space:pre-wrap;word-break:break-all;cursor:pointer;transition:border-color .2s,background .2s;}
.copy-area:active{background:#eff6ff;border-color:#93c5fd;}
.copy-hint{font-size:10px;color:var(--text-sub);margin-top:5px;display:flex;align-items:center;gap:4px;}
.action-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:8px;}
.shuffle-btn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;font-family:'Noto Sans JP',sans-serif;color:var(--text-sub);background:#f3f4f6;border:none;padding:7px 12px;border-radius:var(--radius-sm);cursor:pointer;}
.check-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;border:none;padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;background:#f3f4f6;color:var(--text-sub);}
.check-btn.done{background:var(--success-lt);color:var(--success);}
.check-icon{width:17px;height:17px;border:2px solid currentColor;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.check-btn.done .check-icon{background:var(--success);border-color:var(--success);color:#fff;}

/* ── SEARCH TAB ── */
.search-panel{padding:12px 16px 0;}
.search-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:12px;}
.search-title{font-size:13px;font-weight:700;margin-bottom:10px;}
.input-row{display:flex;gap:8px;margin-bottom:8px;}

/* result card */
.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:10px;}
.result-rank{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text-sub);padding:6px 12px 0;}
.result-card-inner{display:flex;gap:12px;padding:10px 12px 12px;}
.result-img{width:76px;height:76px;object-fit:cover;border-radius:8px;flex-shrink:0;background:#f0f0f0;}
.result-info{flex:1;min-width:0;}
.result-name{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.result-price{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--primary);margin-bottom:3px;}
.result-shop{font-size:10px;color:var(--text-sub);margin-bottom:8px;}
.result-actions{display:flex;gap:7px;flex-wrap:wrap;}
.btn-sm{font-size:11px;font-weight:700;font-family:'Noto Sans JP',sans-serif;padding:6px 12px;border-radius:6px;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}
.btn-sm-primary{background:var(--primary);color:#fff;}
.btn-sm-ghost{background:#f3f4f6;color:var(--text-sub);}
.gen-preview{border-top:1px solid var(--border);padding:12px;background:#fafafa;display:none;}
.gen-preview.show{display:block;}
.gen-text{font-size:12.5px;line-height:1.75;white-space:pre-wrap;word-break:break-all;cursor:pointer;padding:10px;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;}
.gen-text:active{border-color:var(--primary);}
.gen-actions{display:flex;gap:8px;}

/* loading / empty / error */
.loading{text-align:center;padding:40px 20px;color:var(--text-sub);font-size:14px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--text-sub);font-size:14px;}
.error-card{background:#fff0f0;border:1.5px solid #ffbbbb;border-radius:var(--radius-sm);padding:12px 14px;font-size:12px;color:#c02e15;line-height:1.6;margin:12px 16px;}
.error-card strong{display:block;margin-bottom:4px;}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:#111;color:#fff;padding:11px 22px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:all .28s;z-index:999;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-lg);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(min-width:600px){
  .list-controls,.chips-wrap,.counters,.list-wrap,.search-panel{max-width:600px;margin-left:auto;margin-right:auto;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>楽天<span>ROOM</span> 投稿ツール</h1>
  <div class="header-sub">暮らしを楽しむ主婦のセレクトショップ</div>
  <div class="progress-row">
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0 / 0 件</div>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-panel">
  <div class="settings-row">
    <span class="settings-label">楽天 API ID</span>
    <input class="settings-inp" type="text" id="apiKeyInput" placeholder="applicationId を入力">
    <button class="btn-save" onclick="saveSettings()">保存</button>
  </div>
  <div class="settings-row">
    <span class="settings-label">アフィリエイトID</span>
    <input class="settings-inp" type="text" id="affiliateInput" placeholder="affiliateId（報酬に必須）">
  </div>
  <div class="settings-status" id="settingsStatus"></div>
</div>

<!-- MAIN TABS -->
<div class="main-tabs">
  <button class="main-tab active" onclick="switchMain('posts',this)">📋 投稿リスト</button>
  <button class="main-tab" onclick="switchMain('search',this)">🔍 商品検索</button>
</div>

<!-- ===== 投稿リストタブ ===== -->
<div id="tab-posts">

  <!-- コントロール -->
  <div class="list-controls">
    <div class="control-card">
      <div class="control-row">
        <span class="ctrl-label">ジャンル</span>
        <select class="inp" id="listGenre">
          <option value="">総合（全ジャンル）</option>
          <option value="216131">子育て・ベビー用品</option>
          <option value="100804">インテリア・寝具・収納</option>
          <option value="101213">日用品・雑貨・文具</option>
          <option value="100227">本・雑誌・コミック</option>
          <option value="558885">キッチン用品・食器</option>
          <option value="200162">家電・AV機器</option>
          <option value="101070">食品・飲料・酒</option>
          <option value="100433">ファッション・バッグ</option>
          <option value="100534">コスメ・香水・美容</option>
        </select>
        <select class="inp" id="listSort" style="max-width:130px">
          <option value="-reviewCount">レビュー数順</option>
          <option value="-reviewAverage">評価順</option>
          <option value="-affiliateRate">アフィリ率順</option>
          <option value="+itemPrice">価格安い順</option>
          <option value="-itemPrice">価格高い順</option>
        </select>
      </div>
      <div style="margin-top:8px;font-size:11px;font-weight:700;color:var(--text-sub);">投稿トーン</div>
      <div class="tone-row" id="listToneRow">
        <button class="tone-chip active" data-tone="used"    onclick="selTone('list',this)">👩 主婦目線</button>
        <button class="tone-chip"        data-tone="life"    onclick="selTone('list',this)">🤱 ママ共感</button>
        <button class="tone-chip"        data-tone="ranking" onclick="selTone('list',this)">💰 コスパ重視</button>
        <button class="tone-chip"        data-tone="gift"    onclick="selTone('list',this)">🎁 感動レビュー</button>
        <button class="tone-chip"        data-tone="oshi"    onclick="selTone('list',this)">⭐ 推し活</button>
      </div>
      <button class="btn btn-primary" id="fetchListBtn" onclick="fetchPostList()" style="width:100%;margin-top:12px">
        📊 売れ筋100件を取得・更新
      </button>
    </div>
  </div>

  <!-- フィルターチップ -->
  <div class="chips-wrap" id="chips">
    <button class="chip active" onclick="setFilter('all',this)">すべて</button>
    <button class="chip" onclick="setFilter('undone',this)">未投稿のみ</button>
    <button class="chip" onclick="setFilter('child',this)">👶 子育て</button>
    <button class="chip" onclick="setFilter('manga',this)">📚 漫画</button>
    <button class="chip" onclick="setFilter('interior',this)">🏠 インテリア</button>
    <button class="chip" onclick="setFilter('gadget',this)">✨ 便利グッズ</button>
    <button class="chip" onclick="setFilter('general',this)">その他</button>
  </div>

  <!-- カウンター -->
  <div class="counters">
    <div class="counter-card">
      <div class="counter-dot" style="background:var(--primary)"></div>
      <div><div class="counter-label">取得件数</div><div class="counter-value" id="cnt-total">0</div></div>
    </div>
    <div class="counter-card">
      <div class="counter-dot" style="background:var(--success)"></div>
      <div><div class="counter-label">投稿済み</div><div class="counter-value" id="cnt-done">0</div></div>
    </div>
    <div class="counter-card">
      <div class="counter-dot" style="background:var(--warn)"></div>
      <div><div class="counter-label">未投稿</div><div class="counter-value" id="cnt-undone">0</div></div>
    </div>
  </div>

  <div class="list-wrap" id="postList">
    <div class="empty">上の「売れ筋100件を取得・更新」ボタンを押すと<br>APIから最新の売れ筋商品が自動で読み込まれます📊</div>
  </div>
</div>

<!-- ===== 検索タブ ===== -->
<div id="tab-search" style="display:none">
  <div class="search-panel">
    <div class="search-card">
      <div class="search-title">🔍 楽天市場 商品検索</div>
      <div class="input-row">
        <input class="inp" type="text" id="searchKeyword" placeholder="例：知育おもちゃ 木製 1歳">
      </div>
      <div class="input-row">
        <select class="inp" id="searchGenreId">
          <option value="">ジャンル指定なし</option>
          <option value="216131">子育て・ベビー用品</option>
          <option value="100804">インテリア・寝具・収納</option>
          <option value="101213">日用品・雑貨</option>
          <option value="100227">本・雑誌・コミック</option>
          <option value="558885">キッチン用品</option>
          <option value="200162">家電・AV機器</option>
        </select>
        <button class="btn btn-primary" onclick="fetchSearch()">検索</button>
      </div>
      <div style="font-size:11px;font-weight:700;color:var(--text-sub);margin-top:4px;">投稿トーン</div>
      <div class="tone-row" id="searchToneRow">
        <button class="tone-chip active" data-tone="used"    onclick="selTone('search',this)">👩 主婦目線</button>
        <button class="tone-chip"        data-tone="life"    onclick="selTone('search',this)">🤱 ママ共感</button>
        <button class="tone-chip"        data-tone="ranking" onclick="selTone('search',this)">💰 コスパ重視</button>
        <button class="tone-chip"        data-tone="gift"    onclick="selTone('search',this)">🎁 感動レビュー</button>
        <button class="tone-chip"        data-tone="oshi"    onclick="selTone('search',this)">⭐ 推し活</button>
      </div>
    </div>
    <div id="searchResults"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================================================
   定数・設定（拡張可能な設計）
   ================================================ */

// ジャンル分類
const GENRE_MAP = {
  child:    {label:'👶 子育て',     badge:'badge-child',    tags:['#子育て','#ベビーグッズ','#ママのおすすめ','#出産準備','#楽天ROOM']},
  manga:    {label:'📚 漫画アニメ', badge:'badge-manga',    tags:['#漫画','#コミック','#おすすめ漫画','#アニメ好き','#楽天ROOM']},
  interior: {label:'🏠 インテリア', badge:'badge-interior', tags:['#インテリア','#おしゃれ部屋','#収納','#プチプラインテリア','#楽天ROOM']},
  gadget:   {label:'✨ 便利グッズ', badge:'badge-gadget',   tags:['#便利グッズ','#時短家事','#ライフハック','#楽天ランキング','#楽天ROOM']},
  general:  {label:'🛍 その他',     badge:'badge-general',  tags:['#楽天市場','#おすすめ','#購入品','#楽天ROOM']},
};

// 投稿文テンプレート（トーン追加可能）
const TONES = {
  used:    (name,tags) => `${name}を実際に使ってみて大満足✨\nこれを取り入れてから毎日がちょっとラクになりました🥰\n同じように悩んでいる方にぜひ試してほしい一品です。\n\n${tags.join(' ')}`,
  ranking: (name,tags) => `楽天で今話題の${name}をご紹介🏆\n口コミ評価が高くてコスパも最高！\nリピ買い確定な予感…✨ 気になる方はチェックしてみてください👀\n\n${tags.join(' ')}`,
  gift:    (name,tags) => `プレゼントに迷ったらこれ一択🎁\n${name}は実用的で喜ばれること間違いなし！\n楽天ならポイントも貯まってお得です♪\n\n${tags.join(' ')}`,
  life:    (name,tags) => `${name}のおかげで毎日がグッとラクになりました😭✨\nこういう出会いが暮らしをちょっと豊かにしてくれますよね🌿\n同じ悩みのある方にぜひ！\n\n${tags.join(' ')}`,
  oshi:    (name,tags) => `${name}をお迎えしました⭐\nクオリティに感動！お気に入りのひとつになりました🌟\n同じ趣味の方にも絶対おすすめです！\n\n${tags.join(' ')}`,
};

// ジャンルキーワード辞書（商品名から自動分類）
const GENRE_KEYWORDS = {
  child:    /ベビー|赤ちゃん|子供|こども|育児|おむつ|授乳|離乳|知育|おもちゃ|キッズ|ベビーカー|抱っこ/,
  manga:    /漫画|コミック|アニメ|マンガ|フィギュア|グッズ|推し/,
  interior: /インテリア|収納|ベッド|カーテン|照明|家具|マット|ソファ|クッション|ラグ|棚|チェスト|鏡|毛布/,
  gadget:   /家電|掃除|キッチン|調理|洗濯|収納|便利|時短|フィルター|ケトル|イヤホン|スマホ|充電/,
};

/* ================================================
   State
   ================================================ */
let apiKey      = localStorage.getItem('room_api_key') || '';
let affiliateId = localStorage.getItem('room_affiliate_id') || '';
let doneSet     = new Set(JSON.parse(localStorage.getItem('room_done') || '[]'));
let postItems   = []; // 取得した商品リスト（最大100件）
let currentFilter = 'all';
let listTone    = 'used';
let searchTone  = 'used';
let resultTones = {};
let _cbCount    = 0;

/* ================================================
   Init
   ================================================ */
function init() {
  document.getElementById('apiKeyInput').value    = apiKey;
  document.getElementById('affiliateInput').value = affiliateId;
  updateStatus();
  document.getElementById('searchKeyword').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchSearch();
  });
}

/* ================================================
   Settings
   ================================================ */
function saveSettings() {
  apiKey      = document.getElementById('apiKeyInput').value.trim();
  affiliateId = document.getElementById('affiliateInput').value.trim();
  localStorage.setItem('room_api_key', apiKey);
  localStorage.setItem('room_affiliate_id', affiliateId);
  updateStatus();
  showToast('✅ 設定を保存しました');
}
function updateStatus() {
  document.getElementById('settingsStatus').innerHTML = [
    apiKey      ? '<span class="sbadge s-ok">✅ API設定済み</span>'
                : '<span class="sbadge s-ng">⚠ API未設定</span>',
    affiliateId ? '<span class="sbadge s-ok">✅ アフィリエイトID設定済み</span>'
                : '<span class="sbadge s-ng">⚠ アフィリエイトID未設定（報酬が入りません）</span>',
  ].join('');
}

/* ================================================
   URL生成（アフィリエイトID付与）
   ================================================ */
function buildItemUrl(rawUrl) {
  if (!affiliateId || !rawUrl || rawUrl === '#') return rawUrl || '#';
  return `https://hb.afl.rakuten.co.jp/afvc.php?pc=${encodeURIComponent(rawUrl)}&m=${affiliateId}`;
}
function buildSearchUrl(keyword) {
  const base = `https://search.rakuten.co.jp/search/mall/${encodeURIComponent(keyword)}/`;
  return affiliateId
    ? `https://hb.afl.rakuten.co.jp/afvc.php?pc=${encodeURIComponent(base)}&m=${affiliateId}`
    : base;
}

/* ================================================
   Tab switch
   ================================================ */
function switchMain(tab, btn) {
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-posts').style.display  = tab === 'posts'  ? '' : 'none';
  document.getElementById('tab-search').style.display = tab === 'search' ? '' : 'none';
}

/* ================================================
   Tone select
   ================================================ */
function selTone(group, btn) {
  document.getElementById(group + 'ToneRow').querySelectorAll('.tone-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  if (group === 'list')   listTone   = btn.dataset.tone;
  if (group === 'search') searchTone = btn.dataset.tone;
}

/* ================================================
   Filter chips
   ================================================ */
function setFilter(key, btn) {
  currentFilter = key;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderPostList();
}

/* ================================================
   楽天 API（JSONP）
   ================================================ */
function callRakutenAPI(endpoint, params) {
  return new Promise((resolve, reject) => {
    if (!apiKey) {
      showToast('⚠ APIキーを設定・保存してください');
      reject(new Error('no_key'));
      return;
    }
    const n   = ++_cbCount;
    const cb  = '_rc' + n;
    const sid = '_rs' + n;
    const qs  = new URLSearchParams({
      applicationId: apiKey,
      format: 'json',
      formatVersion: '2',
      callback: cb,
      ...params,
    });
    // 新ドメイン対応：ランキングAPIは専用サブドメインを使用
    const domainMap = {
      'IchibaItem/Ranking': 'https://openapi.rakuten.co.jp/ichibaranking/api',
    };
    const baseDomain = Object.entries(domainMap).find(([k]) => endpoint.startsWith(k))?.[1]
      || 'https://openapi.rakuten.co.jp/ichibams/api';
    const url = `${baseDomain}/${endpoint}?${qs}`;

    const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 15000);
    function cleanup() { delete window[cb]; document.getElementById(sid)?.remove(); }

    window[cb] = data => {
      clearTimeout(timer); cleanup();
      data.error ? reject(new Error(data.error + (data.error_description ? ': ' + data.error_description : ''))) : resolve(data);
    };

    const s = document.createElement('script');
    s.id = sid; s.src = url;
    s.onerror = () => { clearTimeout(timer); cleanup(); reject(new Error('network_error')); };
    document.head.appendChild(s);
  });
}

/* ================================================
   エラー文言
   ================================================ */
function errMsg(e) {
  const m = e.message || '';
  if (m === 'no_key')           return 'APIキーを設定・保存してください。';
  if (m === 'timeout')          return '通信タイムアウト。再度お試しください。';
  if (m === 'network_error')    return 'ネットワークエラー。接続を確認してください。';
  if (m.includes('wrong_parameter')) return 'APIキーが正しくありません。再確認してください。';
  if (m.includes('too_many'))   return 'リクエスト上限中です。しばらく待ってから再試行してください。';
  return m || '不明なエラーが発生しました。';
}
function renderError(e, container) {
  document.getElementById(container).innerHTML =
    `<div class="error-card"><strong>⚠ 取得失敗</strong>${errMsg(e)}</div>`;
}

/* ================================================
   ジャンル自動判定
   ================================================ */
function guessGenre(name) {
  for (const [key, re] of Object.entries(GENRE_KEYWORDS)) {
    if (re.test(name)) return key;
  }
  return 'general';
}

/* ================================================
   投稿リスト：楽天APIから100件取得
   ページング：hits=30 を page=1〜4 で取得 → 最大100件
   ================================================ */
async function fetchPostList() {
  if (!apiKey) { showToast('⚠ APIキーを設定・保存してください'); return; }

  const genreId = document.getElementById('listGenre').value;
  const sort    = document.getElementById('listSort').value;
  const btn     = document.getElementById('fetchListBtn');
  const list    = document.getElementById('postList');

  btn.disabled = true;
  list.innerHTML = '<div class="loading"><div class="spinner"></div>売れ筋商品を取得中... (最大100件)</div>';

  try {
    // 30件×4ページ = 最大120件取得し、重複排除して100件に絞る
    const pages   = [1, 2, 3, 4];
    const params  = { sort, hits: 30, minReviewCount: 5 };
    if (genreId) params.genreId = genreId;

    // 並列リクエストは規約違反リスクがあるため逐次取得
    const allItems = [];
    for (const page of pages) {
      try {
        const data = await callRakutenAPI('IchibaItem/Search/20220601', { ...params, page });
        if (data.Items && data.Items.length) {
          allItems.push(...data.Items);
        }
        if (allItems.length >= 100) break;
      } catch (pageErr) {
        // 1ページでも取れていれば続行
        if (allItems.length > 0) break;
        throw pageErr;
      }
    }

    // 重複排除（itemCode基準）して最大100件
    const seen = new Set();
    postItems = allItems
      .filter(item => {
        const key = item.itemCode || item.itemName;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      })
      .slice(0, 100)
      .map((item, i) => ({
        no:      i + 1,
        name:    item.itemName || '商品名なし',
        price:   item.itemPrice ? `¥${Number(item.itemPrice).toLocaleString()}` : '',
        shop:    item.shopName || '',
        img:     item.mediumImageUrls?.[0]?.imageUrl || '',
        rawUrl:  item.itemUrl || '#',
        genre:   guessGenre(item.itemName || ''),
        tone:    listTone,
        reviews: item.reviewCount || 0,
        rating:  item.reviewAverage || 0,
      }));

    btn.disabled = false;
    updateCounters();
    renderPostList();
    showToast(`✅ ${postItems.length}件の売れ筋商品を取得しました`);

  } catch (e) {
    btn.disabled = false;
    list.innerHTML = '';
    renderError(e, 'postList');
  }
}

/* ================================================
   投稿リスト：描画
   ================================================ */
function getFilteredItems() {
  if (currentFilter === 'all')    return postItems;
  if (currentFilter === 'undone') return postItems.filter(p => !doneSet.has(p.no));
  return postItems.filter(p => p.genre === currentFilter);
}

function renderPostList() {
  const list     = document.getElementById('postList');
  const filtered = getFilteredItems();

  if (postItems.length === 0) {
    list.innerHTML = '<div class="empty">上の「売れ筋100件を取得・更新」ボタンを押してください📊</div>';
    return;
  }
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">🎉 このフィルターの投稿はすべて完了！</div>';
    return;
  }

  list.innerHTML = filtered.map(p => postCardHTML(p)).join('');
}

const CHK = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';

function postCardHTML(p) {
  const done  = doneSet.has(p.no);
  const gm    = GENRE_MAP[p.genre] || GENRE_MAP.general;
  const text  = TONES[p.tone](p.name, gm.tags);
  const url   = buildItemUrl(p.rawUrl);

  return `<div class="post-card ${done ? 'done' : ''}" id="pc-${p.no}">
    <div class="card-head">
      <span class="card-no">#${p.no}</span>
      <span class="badge ${gm.badge}">${gm.label}</span>
      ${p.rating ? `<span style="font-size:10px;color:var(--text-sub)">★${p.rating} (${p.reviews}件)</span>` : ''}
    </div>
    <div class="card-body">
      <div class="product-name">${esc(p.name)}</div>
      <div class="product-meta">
        ${p.price ? `<span class="product-price">${p.price}</span>` : ''}
        ${p.shop  ? `<span>${esc(p.shop)}</span>` : ''}
      </div>
      <a class="link-btn" href="${url}" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        楽天市場で商品を見る →
      </a>
      <div class="copy-area" id="ct-${p.no}" onclick="copyElem('ct-${p.no}')">${text}</div>
      <div class="copy-hint">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        タップでコピー（投稿文＋ハッシュタグ）
      </div>
      <div class="action-row">
        <button class="shuffle-btn" onclick="shufflePost(${p.no})">🔀 文章をシャッフル</button>
        <button class="check-btn ${done ? 'done' : ''}" id="cb-${p.no}" onclick="toggleDone(${p.no})">
          <span class="check-icon">${done ? CHK : ''}</span>${done ? '投稿済み' : '投稿済みにする'}
        </button>
      </div>
    </div>
  </div>`;
}

/* ================================================
   シャッフル（投稿文のトーンをランダム変更）
   ================================================ */
function shufflePost(no) {
  const p = postItems.find(x => x.no === no);
  if (!p) return;
  const keys   = Object.keys(TONES).filter(k => k !== p.tone);
  p.tone       = keys[Math.floor(Math.random() * keys.length)];
  const gm     = GENRE_MAP[p.genre] || GENRE_MAP.general;
  const el     = document.getElementById('ct-' + no);
  if (el) {
    el.textContent = TONES[p.tone](p.name, gm.tags);
    el.style.borderColor = 'var(--primary)';
    setTimeout(() => el.style.borderColor = '', 600);
  }
  showToast('🔀 文章を入れ替えました');
}

/* ================================================
   コピー
   ================================================ */
function copyElem(id) {
  const el = document.getElementById(id);
  if (!el) return;
  copyToClipboard(el.textContent);
}
function copyToClipboard(text) {
  navigator.clipboard.writeText(text)
    .then(() => showToast('✅ コピー完了！ROOMに貼り付けてください'))
    .catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try { document.execCommand('copy'); } catch(e) {}
      document.body.removeChild(ta);
      showToast('✅ コピー完了！ROOMに貼り付けてください');
    });
}

/* ================================================
   投稿済みチェック
   ================================================ */
function toggleDone(no) {
  if (doneSet.has(no)) doneSet.delete(no); else doneSet.add(no);
  localStorage.setItem('room_done', JSON.stringify([...doneSet]));
  updateCounters();
  const done = doneSet.has(no);
  const card = document.getElementById('pc-' + no);
  const btn  = document.getElementById('cb-' + no);
  if (card) card.classList.toggle('done', done);
  if (btn) {
    btn.className = 'check-btn' + (done ? ' done' : '');
    btn.innerHTML = `<span class="check-icon">${done ? CHK : ''}</span>${done ? '投稿済み' : '投稿済みにする'}`;
  }
  if (currentFilter === 'undone' && done) {
    const c = document.getElementById('pc-' + no);
    if (c) c.style.display = 'none';
  }
}

/* ================================================
   カウンター更新
   ================================================ */
function updateCounters() {
  const total  = postItems.length;
  const done   = postItems.filter(p => doneSet.has(p.no)).length;
  const undone = total - done;
  document.getElementById('cnt-total').textContent  = total;
  document.getElementById('cnt-done').textContent   = done;
  document.getElementById('cnt-undone').textContent = undone;
  document.getElementById('progressBar').style.width    = total ? `${Math.round(done / total * 100)}%` : '0%';
  document.getElementById('progressLabel').textContent  = `${done} / ${total} 件投稿済み`;
}

/* ================================================
   商品検索タブ
   ================================================ */
async function fetchSearch() {
  const keyword = document.getElementById('searchKeyword').value.trim();
  const genreId = document.getElementById('searchGenreId').value;
  const results = document.getElementById('searchResults');
  if (!keyword) { showToast('キーワードを入力してください'); return; }
  results.innerHTML = '<div class="loading"><div class="spinner"></div>検索中...</div>';
  const params = { keyword, sort: '-reviewCount', hits: 10 };
  if (genreId) params.genreId = genreId;
  try {
    const data = await callRakutenAPI('IchibaItem/Search/20220601', params);
    if (!data.Items || !data.Items.length) {
      results.innerHTML = '<div class="empty">商品が見つかりませんでした</div>';
      return;
    }
    results.innerHTML = data.Items.map((item, i) => searchResultHTML(item, i + 1)).join('');
  } catch(e) {
    renderError(e, 'searchResults');
  }
}

function searchResultHTML(item, rank) {
  const name   = item.itemName || '商品名なし';
  const price  = item.itemPrice ? `¥${Number(item.itemPrice).toLocaleString()}` : '';
  const img    = item.mediumImageUrls?.[0]?.imageUrl || '';
  const shop   = item.shopName || '';
  const url    = buildItemUrl(item.itemUrl || '#');
  const id     = `src-${rank}`;
  const genre  = guessGenre(name);

  return `<div class="result-card" id="${id}">
    <div class="result-rank">${rank}位</div>
    <div class="result-card-inner">
      ${img ? `<img class="result-img" src="${img}" alt="" loading="lazy" onerror="this.style.display='none'">` : '<div class="result-img"></div>'}
      <div class="result-info">
        <div class="result-name">${esc(name)}</div>
        ${price ? `<div class="result-price">${price}</div>` : ''}
        ${shop  ? `<div class="result-shop">${esc(shop)}</div>` : ''}
        <div class="result-actions">
          <a href="${url}" target="_blank" rel="noopener" class="btn-sm btn-sm-ghost">楽天で見る</a>
          <button class="btn-sm btn-sm-primary" onclick="genFromSearch('${id}','${escAttr(name)}','${genre}')">投稿文を生成</button>
        </div>
      </div>
    </div>
    <div class="gen-preview" id="gp-${id}">
      <div class="gen-text" id="gt-${id}" onclick="copyElem('gt-${id}')"></div>
      <div class="copy-hint" style="margin-bottom:8px">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        タップでコピー
      </div>
      <div class="gen-actions">
        <button class="btn-sm btn-sm-ghost" onclick="reshuffleSearch('${id}','${escAttr(name)}','${genre}')">🔀 シャッフル</button>
      </div>
    </div>
  </div>`;
}

function genFromSearch(id, name, genre) {
  resultTones[id] = { name, genre, tone: searchTone };
  const gm = GENRE_MAP[genre] || GENRE_MAP.general;
  document.getElementById('gt-' + id).textContent = TONES[searchTone](name, gm.tags);
  document.getElementById('gp-' + id).classList.add('show');
}
function reshuffleSearch(id, name, genre) {
  const cur  = resultTones[id] || { tone: 'used' };
  const keys = Object.keys(TONES).filter(k => k !== cur.tone);
  const tone = keys[Math.floor(Math.random() * keys.length)];
  resultTones[id] = { name, genre, tone };
  const gm   = GENRE_MAP[genre] || GENRE_MAP.general;
  const el   = document.getElementById('gt-' + id);
  if (el) {
    el.textContent = TONES[tone](name, gm.tags);
    el.style.borderColor = 'var(--primary)';
    setTimeout(() => el.style.borderColor = '', 600);
  }
  showToast('🔀 文章を入れ替えました');
}

/* ================================================
   ユーティリティ
   ================================================ */
function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escAttr(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

let _tt;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2800);
}

/* START */
init();
</script>
