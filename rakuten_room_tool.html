<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>楽天ROOM 投稿ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --card: #ffffff;
    --primary: #e63b2e;
    --primary-light: #fff0ef;
    --midnight: #1e2a4a;
    --midnight-light: #eef1f8;
    --noon: #d97706;
    --noon-light: #fef9ee;
    --child: #3b82f6;
    --child-light: #eff6ff;
    --manga: #8b5cf6;
    --manga-light: #f5f3ff;
    --interior: #10b981;
    --interior-light: #ecfdf5;
    --gadget: #f59e0b;
    --gadget-light: #fffbeb;
    --text: #1a1a1a;
    --text-sub: #6b7280;
    --border: #e5e7eb;
    --done-bg: #d1fae5;
    --done-text: #065f46;
    --radius: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ヘッダー */
  .header {
    background: var(--primary);
    color: white;
    padding: 20px 16px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(230,59,46,0.3);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .header h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header p {
    font-size: 11px;
    opacity: 0.85;
    margin-top: 2px;
  }
  .progress-wrap {
    background: rgba(255,255,255,0.2);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar {
    background: white;
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 11px;
    opacity: 0.9;
    margin-top: 6px;
    text-align: right;
  }

  /* タブ */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 14px 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    background: var(--card);
    color: var(--text-sub);
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }
  .tab.active { background: var(--primary); color: white; }

  /* カウンター */
  .counters {
    display: flex;
    gap: 10px;
    padding: 12px 16px 0;
  }
  .counter-card {
    flex: 1;
    background: var(--card);
    border-radius: 12px;
    padding: 10px 12px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .counter-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .counter-card .label { font-size: 11px; color: var(--text-sub); }
  .counter-card .count { font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif; }

  /* 投稿リスト */
  .list {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .post-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .post-card.done {
    opacity: 0.55;
  }
  .post-card.done .card-body {
    background: var(--done-bg);
  }

  .card-header {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .card-no {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-sub);
    min-width: 26px;
  }
  .time-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 99px;
    flex-shrink: 0;
  }
  .time-midnight { background: var(--midnight-light); color: var(--midnight); }
  .time-noon { background: var(--noon-light); color: var(--noon); }
  .genre-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 99px;
    flex-shrink: 0;
  }
  .genre-child { background: var(--child-light); color: var(--child); }
  .genre-manga { background: var(--manga-light); color: var(--manga); }
  .genre-interior { background: var(--interior-light); color: var(--interior); }
  .genre-gadget { background: var(--gadget-light); color: var(--gadget); }

  .card-body {
    padding: 12px 14px;
    transition: background 0.3s;
  }
  .product-name {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  /* リンクボタン */
  .link-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--primary-light);
    color: var(--primary);
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    transition: background 0.2s;
  }
  .link-btn:active { background: #ffd9d7; }
  .link-btn svg { flex-shrink: 0; }

  /* 投稿文コピーエリア */
  .copy-area {
    background: #fafafa;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12.5px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .copy-area:active { background: #f0f9ff; border-color: #60a5fa; }
  .copy-hint {
    font-size: 10px;
    color: var(--text-sub);
    margin-top: 5px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* コピー成功トースト */
  .copy-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #111;
    color: white;
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }
  .copy-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* チェックボタン */
  .check-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 10px;
  }
  .check-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    border: none;
    background: #f3f4f6;
    color: var(--text-sub);
    font-size: 12px;
    font-weight: 600;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .check-btn.checked {
    background: #d1fae5;
    color: #065f46;
  }
  .check-btn .check-icon {
    width: 18px; height: 18px;
    border: 2px solid currentColor;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .check-btn.checked .check-icon {
    background: #10b981;
    border-color: #10b981;
    color: white;
  }

  /* フィルター表示なし */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-sub);
    font-size: 14px;
  }

  @media (min-width: 640px) {
    .list { max-width: 600px; margin: 0 auto; }
    .tabs { max-width: 600px; margin: 0 auto; }
    .counters { max-width: 600px; margin: 0 auto; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>🛍️ 楽天ROOM 投稿ツール</h1>

    </div>
  </div>
  <div class="progress-wrap">

  </div>
  <div class="progress-text" id="progressText">0 / 50 件投稿済み</div>

<div class="tabs" id="tabs">

  <button class="tab" onclick="filterTab('noon', this)">☀️ 昼12時</button>

  <button class="tab" onclick="filterTab('undone', this)">未投稿のみ</button>
</div>

<div class="counters">
  <div class="counter-card">
    <div class="counter-dot" style="background:var(--midnight)"></div>
    <div>
      <div class="label">深夜0時</div>
      <div class="count" id="cnt-midnight">0/30</div>
    </div>
  </div>
  <div class="counter-card">
    <div class="counter-dot" style="background:var(--noon)"></div>
    <div>
      <div class="label">昼12時</div>
      <div class="count" id="cnt-noon">0/20</div>
    </div>
  </div>
  <div class="counter-card">
    <div class="counter-dot" style="background:var(--primary)"></div>
    <div>
      <div class="label">本日合計</div>
      <div class="count" id="cnt-total">0/50</div>
    </div>
  </div>
</div>

<div class="list" id="list"></div>
<div class="copy-toast" id="toast">✅ コピーしました！ROOMに貼り付けてください</div>

const genreLabel = {child:"👶 子育て", manga:"📚 漫画", interior:"🏠 インテリア", gadget:"✨ 便利グッズ"};
const timeLabel = {midnight:"🌙 深夜0時", noon:"☀️ 昼12時"};
let doneSet = new Set(JSON.parse(localStorage.getItem('done') || '[]'));
let currentFilter = 'all';

function rakutenUrl(product) {
  return 'https://search.rakuten.co.jp/search/mall/' + encodeURIComponent(product) + '/';
}

function saveDone() {
  localStorage.setItem('done', JSON.stringify([...doneSet]));
}

function updateProgress() {
  const total = posts.length;
  const done = doneSet.size;
  const pct = Math.round(done / total * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} 件投稿済み`;

  const midnightDone = posts.filter(p => p.time === 'midnight' && doneSet.has(p.no)).length;
  const noonDone = posts.filter(p => p.time === 'noon' && doneSet.has(p.no)).length;
  document.getElementById('cnt-midnight').textContent = `${midnightDone}/30`;
  document.getElementById('cnt-noon').textContent = `${noonDone}/20`;
  document.getElementById('cnt-total').textContent = `${done}/50`;
}

function filterTab(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const list = document.getElementById('list');
  let filtered = posts;
  if (currentFilter === 'midnight') filtered = posts.filter(p => p.time === 'midnight');
  else if (currentFilter === 'noon') filtered = posts.filter(p => p.time === 'noon');
  else if (currentFilter === 'undone') filtered = posts.filter(p => !doneSet.has(p.no));
  else if (['child','manga','interior','gadget'].includes(currentFilter)) filtered = posts.filter(p => p.genre === currentFilter);

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">🎉 このフィルターの投稿はすべて完了しました！</div>';
    return;
  }

  list.innerHTML = filtered.map(p => {
    const done = doneSet.has(p.no);
    return `
    <div class="post-card ${done ? 'done' : ''}" id="card-${p.no}">
      <div class="card-header">
        <span class="card-no">#${p.no}</span>
        <span class="time-badge time-${p.time}">${timeLabel[p.time]}</span>
        <span class="genre-badge genre-${p.genre}">${genreLabel[p.genre]}</span>
      </div>
      <div class="card-body">
        <div class="product-name">${p.product}</div>
        <a class="link-btn" href="${rakutenUrl(p.product)}" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          楽天市場で商品を探す →
        </a>
        <div class="copy-area" onclick="copyText(${p.no}, this)">${p.text}</div>
        <div class="copy-hint">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          タップでコピー（投稿文＋ハッシュタグ）
        </div>
        <div class="check-row">
          <button class="check-btn ${done ? 'checked' : ''}" onclick="toggleDone(${p.no})" id="btn-${p.no}">
            <span class="check-icon">
              ${done ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
            </span>
            ${done ? '投稿済み' : '投稿済みにする'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function copyText(no, el) {
  const post = posts.find(p => p.no === no);
  if (!post) return;
  navigator.clipboard.writeText(post.text).then(() => {
    showToast();
  }).catch(() => {
    // fallback for older iOS
    const ta = document.createElement('textarea');
    ta.value = post.text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast();
  });
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function toggleDone(no) {
  if (doneSet.has(no)) {
    doneSet.delete(no);
  } else {
    doneSet.add(no);
  }
  saveDone();
  updateProgress();
  // カードだけ再描画
  const post = posts.find(p => p.no === no);
  const done = doneSet.has(no);
  const card = document.getElementById('card-' + no);
  if (card) {
    card.classList.toggle('done', done);
    const btn = document.getElementById('btn-' + no);
    btn.className = 'check-btn' + (done ? ' checked' : '');
    btn.innerHTML = `<span class="check-icon">${done ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}</span>${done ? '投稿済み' : '投稿済みにする'}`;
  }
  // 未投稿フィルター中は再描画
  if (currentFilter === 'undone') renderList();
}

// 初期化
updateProgress();
renderList();
</script>
